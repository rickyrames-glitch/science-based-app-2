<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Based App</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050508;--s1:#07070f;--s2:#0d0d1a;--s3:#111122;
  --border:#181830;--border2:#20203a;
  --muted:#52527a;--dim:#34345a;--white:#eef0ff;--text:#d8ddf0;
  --blue:#3b82f6;--green:#10b981;--gold:#f59e0b;--red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;min-height:100vh;}

/* ── Auth overlay ── */
#auth-overlay{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
#auth-overlay.hidden{display:none;}
.auth-card{
  background:var(--s1);border:1px solid var(--border2);border-radius:8px;
  width:100%;max-width:420px;padding:36px 32px;
}
.auth-logo{
  display:flex;align-items:center;justify-content:center;margin-bottom:28px;
}
.auth-title{
  font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;color:var(--white);
  text-align:center;margin-bottom:6px;
}
.auth-sub{
  font-family:'JetBrains Mono',monospace;font-size:0.52rem;
  text-transform:uppercase;letter-spacing:2px;color:var(--muted);
  text-align:center;margin-bottom:28px;
}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.auth-tab{
  flex:1;padding:8px;text-align:center;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:0.54rem;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);
  background:transparent;border:none;transition:all 0.15s;
}
.auth-tab.active{background:var(--s2);color:var(--white);}
.auth-field{margin-bottom:14px;}
.auth-field label{
  display:block;font-family:'JetBrains Mono',monospace;font-size:0.5rem;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:5px;
}
.auth-field input{
  width:100%;background:var(--s2);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.82rem;
  padding:9px 11px;outline:none;transition:border-color 0.15s;
}
.auth-field input:focus{border-color:var(--blue);}
.auth-btn{
  width:100%;background:var(--white);color:var(--bg);border:none;border-radius:3px;
  padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;
  font-weight:700;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;margin-top:4px;
}
.auth-btn:hover{background:var(--blue);color:#fff;}
.auth-divider{
  display:flex;align-items:center;gap:10px;margin:16px 0;
  font-family:'JetBrains Mono',monospace;font-size:0.46rem;
  text-transform:uppercase;letter-spacing:2px;color:var(--dim);
}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.social-btn{
  width:100%;background:transparent;border:1px solid var(--border);border-radius:3px;
  padding:10px;font-family:'JetBrains Mono',monospace;font-size:0.56rem;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--text);
  cursor:pointer;transition:all 0.15s;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.social-btn:hover{border-color:var(--blue);color:var(--blue);}
.auth-error{
  font-family:'JetBrains Mono',monospace;font-size:0.52rem;
  color:var(--red);margin-top:10px;text-align:center;min-height:18px;
}
.auth-reset{
  font-family:'JetBrains Mono',monospace;font-size:0.48rem;
  text-transform:uppercase;letter-spacing:1px;color:var(--muted);
  text-align:center;margin-top:12px;cursor:pointer;
  background:none;border:none;width:100%;
}
.auth-reset:hover{color:var(--blue);}

/* ── Top nav ── */
#app-nav{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;background:var(--s1);
  border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}
.nav-logo{
  font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;color:var(--white);margin-right:8px;
}
.nav-btn{
  font-family:'JetBrains Mono',monospace;font-size:0.52rem;
  text-transform:uppercase;letter-spacing:1.5px;
  padding:6px 14px;border-radius:2px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;
}
.nav-btn:hover{border-color:var(--blue);color:var(--blue);}
.nav-btn.active{color:var(--white);border-color:var(--white);background:rgba(255,255,255,0.05);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.nav-user{
  font-family:'JetBrains Mono',monospace;font-size:0.48rem;
  text-transform:uppercase;letter-spacing:1px;color:var(--muted);
}
.nav-signout{
  font-family:'JetBrains Mono',monospace;font-size:0.48rem;
  text-transform:uppercase;letter-spacing:1px;color:var(--dim);
  background:none;border:none;cursor:pointer;padding:4px 8px;
  border:1px solid var(--border);border-radius:2px;transition:all 0.15s;
}
.nav-signout:hover{color:var(--red);border-color:var(--red);}

/* ── Frame wrap ── */
#frame-wrap{flex:1;position:relative;}
.module-frame{
  display:none;width:100%;height:100%;border:none;
  position:absolute;top:0;left:0;right:0;bottom:0;
}
.module-frame.active{display:block;}

/* ── Save indicator ── */
#save-indicator{
  position:fixed;bottom:16px;right:16px;z-index:100;
  font-family:'JetBrains Mono',monospace;font-size:0.48rem;
  text-transform:uppercase;letter-spacing:1.5px;
  padding:5px 12px;border-radius:2px;
  background:var(--s2);border:1px solid var(--border);
  color:var(--muted);opacity:0;transition:opacity 0.3s;pointer-events:none;
}
#save-indicator.show{opacity:1;}
#save-indicator.saved{color:var(--green);border-color:var(--green);}
#save-indicator.error{color:var(--red);border-color:var(--red);}
</style>
</head>
<body>

<!-- ── AUTH OVERLAY ── -->
<div id="auth-overlay">
  <div class="auth-card">

    <!-- Logo mark -->
    <div class="auth-logo">
      <svg width="64" height="64" viewBox="0 0 680 680">
        <circle cx="340" cy="340" r="225" fill="#0b0b2e"/>
        <g transform="rotate(-20 340 340)"><ellipse cx="340" cy="340" rx="198" ry="70" fill="none" stroke="#60a5fa" stroke-width="1.0" opacity="0.55"/></g>
        <g transform="rotate(40 340 340)"><ellipse cx="340" cy="340" rx="198" ry="70" fill="none" stroke="#60a5fa" stroke-width="1.0" opacity="0.55"/></g>
        <g transform="rotate(-80 340 340)"><ellipse cx="340" cy="340" rx="198" ry="70" fill="none" stroke="#60a5fa" stroke-width="1.0" opacity="0.55"/></g>
        <circle cx="523" cy="299" r="13" fill="#0e1a30" stroke="#60a5fa" stroke-width="1.8"/>
        <circle cx="201" cy="433" r="13" fill="#0e1a30" stroke="#60a5fa" stroke-width="1.8"/>
        <circle cx="254" cy="301" r="13" fill="#0e1a30" stroke="#60a5fa" stroke-width="1.8"/>
        <circle cx="350" cy="434" r="13" fill="#0e1a30" stroke="#60a5fa" stroke-width="1.8"/>
        <circle cx="193" cy="209" r="13" fill="#0e1a30" stroke="#60a5fa" stroke-width="1.8"/>
        <circle cx="472" cy="381" r="13" fill="#0e1a30" stroke="#60a5fa" stroke-width="1.8"/>
        <circle cx="408" cy="187" r="13" fill="#0e1a30" stroke="#60a5fa" stroke-width="1.8"/>
        <circle cx="338" cy="522" r="13" fill="#0e1a30" stroke="#60a5fa" stroke-width="1.8"/>
        <circle cx="292" cy="247" r="13" fill="#0e1a30" stroke="#60a5fa" stroke-width="1.8"/>
        <g transform="translate(340,340) scale(2.2)">
          <path d="M 0 11 C 0 11 -16 1 -16 -7 C -16 -17 -8 -20 0 -10 C 8 -20 16 -17 16 -7 C 16 1 0 11 0 11 Z" fill="#c0003f"/>
        </g>
      </svg>
    </div>

    <div class="auth-title">Science Based</div>
    <div class="auth-sub">Performance App</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('signin')">Sign In</button>
      <button class="auth-tab"       onclick="authTab('signup')">Create Account</button>
    </div>

    <div id="auth-form-signin">
      <div class="auth-field"><label>Email</label><input type="email" id="si-email" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="auth-field"><label>Password</label><input type="password" id="si-pass" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="auth-btn" onclick="emailSignIn()">Sign In</button>
      <button class="auth-reset" onclick="resetPassword()">Forgot password?</button>
    </div>

    <div id="auth-form-signup" style="display:none">
      <div class="auth-field"><label>Email</label><input type="email" id="su-email" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="auth-field"><label>Password</label><input type="password" id="su-pass" placeholder="Min 6 characters" autocomplete="new-password"/></div>
      <button class="auth-btn" onclick="emailSignUp()">Create Account</button>
    </div>

    <div class="auth-divider">or</div>

    <button class="social-btn" onclick="googleSignIn()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <button class="social-btn" onclick="appleSignIn()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Continue with Apple
    </button>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ── SAVE INDICATOR ── -->
<div id="save-indicator">Saving...</div>

<!-- ── APP NAV (shown after login) ── -->
<div id="app-nav" style="display:none">
  <span class="nav-logo">SBA</span>
  <button class="nav-btn active" onclick="switchTo('workout')">Workout</button>
  <button class="nav-btn"        onclick="switchTo('nutrition')">Nutrition</button>
  <button class="nav-btn"        onclick="switchTo('milestone')">Milestones</button>
  <div class="nav-right">
    <span class="nav-user" id="nav-user-email"></span>
    <button class="nav-signout" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div id="frame-wrap" style="display:none">
  <iframe id="frame-workout"   class="module-frame active" src="./workout-formulation-2-2.html"></iframe>
  <iframe id="frame-nutrition" class="module-frame"        src="./nutrition-formulation-2-2.html"></iframe>
  <iframe id="frame-milestone" class="module-frame"        src="./milestone-tracker-2-3.html"></iframe>
</div>

<!-- ── FIREBASE SDKs ── -->
<script type="module">
import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut as fbSignOut,
         createUserWithEmailAndPassword, signInWithEmailAndPassword,
         GoogleAuthProvider, OAuthProvider,
         signInWithPopup, sendPasswordResetEmail }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, addDoc,
         collection, serverTimestamp, query, orderBy, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Firebase init ────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            'AIzaSyAzu3ctTbwDvkvh2Lpu5KSIPfqkq_pLchE',
  authDomain:        'the-science-based-app.firebaseapp.com',
  projectId:         'the-science-based-app',
  storageBucket:     'the-science-based-app.firebasestorage.app',
  messagingSenderId: '201415841400',
  appId:             '1:201415841400:web:1daf1e2c398010764d3f8d'
};
const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

// ── Providers ────────────────────────────────────────────────────────────────
const googleProvider = new GoogleAuthProvider();
const appleProvider  = new OAuthProvider('apple.com');
appleProvider.addScope('email');
appleProvider.addScope('name');

// ── Auth state ───────────────────────────────────────────────────────────────
let currentUser = null;

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    showApp(user);
    loadUserData(user.uid);
  } else {
    showAuth();
  }
});

function showApp(user) {
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('app-nav').style.display    = 'flex';
  document.getElementById('frame-wrap').style.display = 'block';
  document.getElementById('nav-user-email').textContent = user.email || '';
  sizeFrames();
}

function showAuth() {
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('app-nav').style.display    = 'none';
  document.getElementById('frame-wrap').style.display = 'none';
}

function setError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

// ── Auth actions (exposed to window) ─────────────────────────────────────────
window.emailSignIn = async () => {
  setError('');
  const email = document.getElementById('si-email').value.trim();
  const pass  = document.getElementById('si-pass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    setError(friendlyError(e.code));
  }
};

window.emailSignUp = async () => {
  setError('');
  const email = document.getElementById('su-email').value.trim();
  const pass  = document.getElementById('su-pass').value;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await initUserDoc(cred.user);
  } catch(e) {
    setError(friendlyError(e.code));
  }
};

window.googleSignIn = async () => {
  setError('');
  try {
    const cred = await signInWithPopup(auth, googleProvider);
    await initUserDoc(cred.user);
  } catch(e) { setError(friendlyError(e.code)); }
};

window.appleSignIn = async () => {
  setError('');
  try {
    const cred = await signInWithPopup(auth, appleProvider);
    await initUserDoc(cred.user);
  } catch(e) { setError(friendlyError(e.code)); }
};

window.signOut = async () => {
  await fbSignOut(auth);
};

window.resetPassword = async () => {
  const email = document.getElementById('si-email').value.trim();
  if (!email) { setError('Enter your email above first'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    setError('Reset email sent — check your inbox');
  } catch(e) { setError(friendlyError(e.code)); }
};

// ── User document init ────────────────────────────────────────────────────────
async function initUserDoc(user) {
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      email:     user.email || '',
      createdAt: serverTimestamp(),
      lastActive: serverTimestamp(),
    });
  }
}

// ── Load user data into iframes via postMessage ───────────────────────────────
async function loadUserData(uid) {
  try {
    // Load latest workout formulation
    const wfRef  = doc(db, 'users', uid, 'formulations', 'workout');
    const nfRef  = doc(db, 'users', uid, 'formulations', 'nutrition');
    const mtRef  = doc(db, 'users', uid, 'formulations', 'milestone');
    const [wfSnap, nfSnap, mtSnap] = await Promise.all([
      getDoc(wfRef), getDoc(nfRef), getDoc(mtRef)
    ]);

    // Load metric history for progression
    const metricsRef = collection(db, 'users', uid, 'metricLogs');
    const metricsQ   = query(metricsRef, orderBy('date', 'desc'));
    const metricsSnap= await getDocs(metricsQ);
    const metricHistory = metricsSnap.docs.map(d => ({ id:d.id, ...d.data() }));

    // Bundle and broadcast to all iframes
    const payload = {
      type:     'sba-load',
      workout:  wfSnap.exists()  ? wfSnap.data()  : null,
      nutrition:nfSnap.exists()  ? nfSnap.data()  : null,
      milestone:mtSnap.exists()  ? mtSnap.data()  : null,
      metricHistory,
    };
    ['workout','nutrition','milestone'].forEach(m => {
      const frame = document.getElementById('frame-'+m);
      if (frame?.contentWindow) frame.contentWindow.postMessage(payload, '*');
    });
  } catch(e) {
    console.warn('loadUserData error:', e);
  }
}

// ── Listen for save requests from iframes ─────────────────────────────────────
window.addEventListener('message', async e => {
  if (!currentUser) return;
  const { type, module: mod, data } = e.data || {};

  if (type === 'sba-save') {
    showSaveIndicator('saving');
    try {
      const uid = currentUser.uid;
      await setDoc(
        doc(db, 'users', uid, 'formulations', mod),
        { ...data, savedAt: serverTimestamp() },
        { merge: true }
      );
      // Update last active
      await setDoc(doc(db,'users',uid), { lastActive: serverTimestamp() }, { merge:true });
      showSaveIndicator('saved');
    } catch(err) {
      console.error('Save error:', err);
      showSaveIndicator('error');
    }
  }

  if (type === 'sba-log-metric') {
    try {
      const uid = currentUser.uid;
      await addDoc(collection(db, 'users', uid, 'metricLogs'), {
        ...e.data.data,
        loggedAt: serverTimestamp(),
      });
      // Reload metric history into iframes
      loadUserData(uid);
    } catch(err) {
      console.error('Metric log error:', err);
    }
  }
});

// ── Save indicator ────────────────────────────────────────────────────────────
let saveTimer;
function showSaveIndicator(state) {
  const el = document.getElementById('save-indicator');
  el.className = 'show ' + (state === 'saving' ? '' : state);
  el.textContent = state === 'saving' ? 'Saving...' : state === 'saved' ? '✓ Saved' : '✗ Save failed';
  clearTimeout(saveTimer);
  if (state !== 'saving') saveTimer = setTimeout(() => el.className = '', 2500);
}

// ── Friendly error messages ───────────────────────────────────────────────────
function friendlyError(code) {
  const map = {
    'auth/invalid-email':          'Invalid email address',
    'auth/user-not-found':         'No account found with that email',
    'auth/wrong-password':         'Incorrect password',
    'auth/email-already-in-use':   'An account with this email already exists',
    'auth/weak-password':          'Password must be at least 6 characters',
    'auth/too-many-requests':      'Too many attempts — try again later',
    'auth/popup-closed-by-user':   'Sign-in cancelled',
    'auth/network-request-failed': 'Network error — check your connection',
  };
  return map[code] || 'Something went wrong — try again';
}

// ── Auth tab toggle ───────────────────────────────────────────────────────────
window.authTab = (tab) => {
  document.getElementById('auth-form-signin').style.display = tab==='signin'?'block':'none';
  document.getElementById('auth-form-signup').style.display = tab==='signup'?'block':'none';
  document.querySelectorAll('.auth-tab').forEach((t,i) =>
    t.classList.toggle('active', (i===0&&tab==='signin')||(i===1&&tab==='signup')));
  setError('');
};

// ── Module switcher ───────────────────────────────────────────────────────────
const MODULES = ['workout','nutrition','milestone'];
const BTNS    = document.querySelectorAll('.nav-btn');

window.switchTo = name => {
  MODULES.forEach((m,i) => {
    document.getElementById('frame-'+m).classList.toggle('active', m===name);
    BTNS[i].classList.toggle('active', m===name);
  });
  // Send load data to newly visible frame
  if (currentUser) loadUserData(currentUser.uid);
};

// ── Frame sizing ──────────────────────────────────────────────────────────────
function sizeFrames() {
  const navH = document.getElementById('app-nav').offsetHeight;
  document.getElementById('frame-wrap').style.height = (window.innerHeight - navH) + 'px';
}
window.addEventListener('resize', sizeFrames);

// ── Enter key on auth inputs ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const signinVisible = document.getElementById('auth-form-signin').style.display !== 'none';
  if (signinVisible) window.emailSignIn();
  else window.emailSignUp();
});

</script>
</body>

import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged,
         createUserWithEmailAndPassword,
         signInWithEmailAndPassword,
         signInWithPopup, signOut as fbSignOut,
         sendPasswordResetEmail,
         GoogleAuthProvider, OAuthProvider }       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc,
         addDoc, collection, query,
         orderBy, getDocs, serverTimestamp,
         limit }                                   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyAzu3ctTbwDvkvh2Lpu5KSIPfqkq_pLchE",
  authDomain:        "the-science-based-app.firebaseapp.com",
  projectId:         "the-science-based-app",
  storageBucket:     "the-science-based-app.firebasestorage.app",
  messagingSenderId: "201415841400",
  appId:             "1:201415841400:web:1daf1e2c398010764d3f8d"
};

const app           = initializeApp(firebaseConfig);
const auth          = getAuth(app);
const db            = getFirestore(app);
const googleProvider= new GoogleAuthProvider();
const appleProvider = new OAuthProvider('apple.com');
appleProvider.addScope('email');
appleProvider.addScope('name');

let currentUser = null;

// ═══════════════════════════════════════════════════════════════════════════
// AUTH STATE
// ═══════════════════════════════════════════════════════════════════════════
onAuthStateChanged(auth, async user => {
  currentUser = user;
  if (user) {
    // Hide auth overlay, show app
    document.getElementById('auth-overlay').classList.add('hidden');
    document.getElementById('app-nav').style.display = 'flex';
    document.getElementById('frame-wrap').style.display = 'block';
    document.getElementById('save-indicator').style.display = 'block';
    // Show user email in nav
    document.getElementById('nav-user-email').textContent = user.email || '';
    // Size frames and load data
    sizeFrames();
    await initUserDoc(user);
    await loadUserData(user.uid);
  } else {
    // Show auth overlay
    document.getElementById('auth-overlay').classList.remove('hidden');
    document.getElementById('app-nav').style.display = 'none';
    document.getElementById('frame-wrap').style.display = 'none';
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// AUTH ACTIONS
// ═══════════════════════════════════════════════════════════════════════════
function setError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

window.emailSignIn = async () => {
  setError('');
  const email = document.getElementById('si-email').value.trim();
  const pass  = document.getElementById('si-pass').value;
  if (!email || !pass) { setError('Please enter email and password'); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) { setError(friendlyError(e.code)); }
};

window.emailSignUp = async () => {
  setError('');
  const email = document.getElementById('su-email').value.trim();
  const pass  = document.getElementById('su-pass').value;
  if (!email || !pass) { setError('Please fill in all fields'); return; }
  if (pass.length < 6) { setError('Password must be at least 6 characters'); return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await initUserDoc(cred.user);
  } catch(e) { setError(friendlyError(e.code)); }
};

window.googleSignIn = async () => {
  setError('');
  try {
    const cred = await signInWithPopup(auth, googleProvider);
    await initUserDoc(cred.user);
  } catch(e) { setError(friendlyError(e.code)); }
};

window.appleSignIn = async () => {
  setError('');
  try {
    const cred = await signInWithPopup(auth, appleProvider);
    await initUserDoc(cred.user);
  } catch(e) { setError(friendlyError(e.code)); }
};

window.signOut = async () => {
  await fbSignOut(auth);
};

window.resetPassword = async () => {
  const email = document.getElementById('si-email').value.trim();
  if (!email) { setError('Enter your email above first'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    setError('Reset email sent — check your inbox');
  } catch(e) { setError(friendlyError(e.code)); }
};

// ═══════════════════════════════════════════════════════════════════════════
// USER DOCUMENT INIT
// Creates user profile doc on first sign-in
// ═══════════════════════════════════════════════════════════════════════════
async function initUserDoc(user) {
  const ref  = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      email:      user.email || '',
      displayName:user.displayName || '',
      createdAt:  serverTimestamp(),
      lastActive: serverTimestamp(),
      profile: {
        age: null, sex: null, bodyweight: null,
        trainingLevel: null, yearsTraining: null,
      }
    });
  } else {
    // Update last active
    await setDoc(ref, { lastActive: serverTimestamp() }, { merge: true });
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// LOAD USER DATA → broadcast to iframes
// ═══════════════════════════════════════════════════════════════════════════
async function loadUserData(uid) {
  try {
    const [wfSnap, nfSnap, mtSnap] = await Promise.all([
      getDoc(doc(db, 'users', uid, 'formulations', 'workout')),
      getDoc(doc(db, 'users', uid, 'formulations', 'nutrition')),
      getDoc(doc(db, 'users', uid, 'formulations', 'milestone')),
    ]);

    // Metric history — last 90 entries
    const metricsSnap = await getDocs(
      query(collection(db, 'users', uid, 'metricLogs'),
        orderBy('date', 'desc'), limit(90))
    );
    const metricHistory = metricsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Progress log — last 90 sessions
    const progressSnap = await getDocs(
      query(collection(db, 'users', uid, 'progressLog'),
        orderBy('loggedAt', 'desc'), limit(90))
    );
    const progressHistory = progressSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Compute progression rates from metric history
    const progressionRates = computeProgressionRates(metricHistory);

    const payload = {
      type:             'sba-load',
      uid,
      workout:          wfSnap.exists()  ? wfSnap.data()  : null,
      nutrition:        nfSnap.exists()  ? nfSnap.data()  : null,
      milestone:        mtSnap.exists()  ? mtSnap.data()  : null,
      metricHistory,
      progressHistory,
      progressionRates,
    };

    // Broadcast to all iframes
    ['workout','nutrition','milestone'].forEach(m => {
      const frame = document.getElementById('frame-' + m);
      if (frame?.contentWindow) frame.contentWindow.postMessage(payload, '*');
    });

  } catch(e) {
    console.warn('loadUserData error:', e);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// PROGRESSION RATE ENGINE
// Computes per-metric rate of change per month from dated history
// Returns projected weeks to each milestone threshold
// ═══════════════════════════════════════════════════════════════════════════
function computeProgressionRates(history) {
  if (history.length < 2) return null;

  const sorted = [...history].sort((a,b) => new Date(a.date) - new Date(b.date));
  const first  = sorted[0];
  const last   = sorted[sorted.length - 1];
  const months = (new Date(last.date) - new Date(first.date)) / (1000 * 60 * 60 * 24 * 30.44);

  if (months < 0.1) return null;

  const rate = (metric) => {
    const f = first[metric], l = last[metric];
    if (f == null || l == null) return null;
    return (l - f) / months; // change per month
  };

  const rates = {
    vo2: rate('vo2'),
    lbm: rate('lbm'),
    bf:  rate('bf'),
    str: rate('str'),
    months,
    entries: history.length,
    firstDate: first.date,
    lastDate:  last.date,
  };

  // Weeks to target given current value and rate
  rates.weeksToTarget = (current, target, metricKey) => {
    const r = rates[metricKey];
    if (!r || r === 0) return null;
    const gap = target - current;
    // For bf: improvement means decreasing, so rate should be negative
    if (Math.sign(gap) !== Math.sign(r)) return null; // moving wrong direction
    return Math.round((gap / r) * 4.33); // months to weeks
  };

  return rates;
}

// ═══════════════════════════════════════════════════════════════════════════
// LISTEN FOR MESSAGES FROM IFRAMES
// Iframes post messages to save data or log metrics
// ═══════════════════════════════════════════════════════════════════════════
window.addEventListener('message', async e => {
  if (!currentUser) return;
  const { type, module: mod, data } = e.data || {};
  const uid = currentUser.uid;

  // ── Save formulation inputs ──────────────────────────────────────────────
  if (type === 'sba-save') {
    showSaveIndicator('saving');
    try {
      await setDoc(
        doc(db, 'users', uid, 'formulations', mod),
        { ...data, savedAt: serverTimestamp() },
        { merge: true }
      );
      await setDoc(doc(db,'users',uid), { lastActive: serverTimestamp() }, { merge: true });
      showSaveIndicator('saved');
    } catch(err) {
      console.error('Save error:', err);
      showSaveIndicator('error');
    }
  }

  // ── Log metric snapshot (from milestone tracker compute) ─────────────────
  if (type === 'sba-log-metric') {
    try {
      await addDoc(collection(db, 'users', uid, 'metricLogs'), {
        ...data,
        loggedAt: serverTimestamp(),
      });
      await loadUserData(uid); // refresh progression rates
    } catch(err) { console.error('Metric log error:', err); }
  }

  // ── Log progress snapshot (full session summary) ─────────────────────────
  if (type === 'sba-log-progress') {
    try {
      await addDoc(collection(db, 'users', uid, 'progressLog'), {
        ...data,
        loggedAt: serverTimestamp(),
      });
    } catch(err) { console.error('Progress log error:', err); }
  }

  // ── Save user profile ────────────────────────────────────────────────────
  if (type === 'sba-save-profile') {
    try {
      await setDoc(
        doc(db, 'users', uid),
        { profile: data, lastActive: serverTimestamp() },
        { merge: true }
      );
    } catch(err) { console.error('Profile save error:', err); }
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// SAVE INDICATOR
// ═══════════════════════════════════════════════════════════════════════════
let saveTimer;
function showSaveIndicator(state) {
  const el = document.getElementById('save-indicator');
  el.className = 'show ' + (state === 'saving' ? '' : state);
  el.textContent = state==='saving' ? 'Saving...' : state==='saved' ? '✓ Saved' : '✗ Save failed';
  clearTimeout(saveTimer);
  if (state !== 'saving') saveTimer = setTimeout(() => el.className = '', 2500);
}

// ═══════════════════════════════════════════════════════════════════════════
// FRIENDLY ERROR MESSAGES
// ═══════════════════════════════════════════════════════════════════════════
function friendlyError(code) {
  const map = {
    'auth/invalid-email':          'Invalid email address',
    'auth/user-not-found':         'No account with that email',
    'auth/wrong-password':         'Incorrect password',
    'auth/invalid-credential':     'Incorrect email or password',
    'auth/email-already-in-use':   'An account with this email already exists',
    'auth/weak-password':          'Password must be at least 6 characters',
    'auth/too-many-requests':      'Too many attempts — try again later',
    'auth/popup-closed-by-user':   'Sign-in cancelled',
    'auth/network-request-failed': 'Network error — check your connection',
  };
  return map[code] || 'Something went wrong — try again';
}

// ═══════════════════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════════════════
window.authTab = (tab) => {
  document.getElementById('auth-form-signin').style.display = tab==='signin' ? 'block' : 'none';
  document.getElementById('auth-form-signup').style.display = tab==='signup' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t,i) =>
    t.classList.toggle('active', (i===0&&tab==='signin')||(i===1&&tab==='signup')));
  setError('');
};

const MODULES = ['workout','nutrition','milestone'];

window.switchTo = name => {
  MODULES.forEach((m,i) => {
    document.getElementById('frame-'+m).classList.toggle('active', m===name);
    document.querySelectorAll('.nav-btn')[i].classList.toggle('active', m===name);
  });
  if (currentUser) loadUserData(currentUser.uid);
};

function sizeFrames() {
  const navH = document.getElementById('app-nav')?.offsetHeight || 0;
  const wrap  = document.getElementById('frame-wrap');
  if (wrap) wrap.style.height = (window.innerHeight - navH) + 'px';
}
window.addEventListener('resize', sizeFrames);

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const signinVisible = document.getElementById('auth-form-signin')?.style.display !== 'none';
  if (signinVisible) window.emailSignIn?.();
  else window.emailSignUp?.();
});

</script>
